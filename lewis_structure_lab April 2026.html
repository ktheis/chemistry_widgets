<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Dot &amp; Stick — Lewis Structure Workbench</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;1,9..144,400&family=Inter+Tight:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #1a1410;
    --ink-soft: #4a3f37;
    --paper: #f2ead8;
    --paper-deep: #e6dcc2;
    --paper-shadow: rgba(80, 50, 20, 0.08);
    --atom: #f9978b;
    --atom-deep: #d66659;
    --bond: #83d8f4;
    --bond-deep: #3e9bbb;
    --accent: #2d5f4e;
    --danger: #9a3a2e;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    overflow: hidden;
    font-family: 'Inter Tight', system-ui, sans-serif;
    background: var(--paper);
    color: var(--ink);
    -webkit-font-smoothing: antialiased;
  }

  /* Warm paper texture via layered gradients */
  body {
    background:
      radial-gradient(ellipse 1200px 800px at 20% 10%, rgba(249, 151, 139, 0.06), transparent 60%),
      radial-gradient(ellipse 900px 600px at 85% 90%, rgba(131, 216, 244, 0.08), transparent 60%),
      var(--paper);
    display: flex;
    flex-direction: column;
  }

  /* ============ HEADER ============ */
  header {
    flex-shrink: 0;
    padding: 14px 28px;
    display: flex;
    align-items: center;
    gap: 28px;
    border-bottom: 1.5px solid var(--ink);
    background: rgba(242, 234, 216, 0.85);
    backdrop-filter: blur(6px);
  }

  .brand {
    font-family: 'Fraunces', serif;
    font-weight: 600;
    font-size: 22px;
    letter-spacing: -0.015em;
    line-height: 1;
  }
  .brand em {
    font-style: italic;
    font-weight: 400;
    color: var(--atom-deep);
  }
  .brand .dot {
    color: var(--atom-deep);
  }
  .brand .stick {
    color: var(--bond-deep);
  }
  .subtitle {
    font-size: 11.5px;
    color: var(--ink-soft);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-top: 2px;
  }

  nav.tabs {
    display: flex;
    gap: 0;
    margin-left: auto;
    border: 1.5px solid var(--ink);
  }
  nav.tabs button {
    padding: 7px 14px;
    background: transparent;
    border: none;
    border-right: 1.5px solid var(--ink);
    font-family: inherit;
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 0.06em;
    text-transform: lowercase;
    color: var(--ink);
    cursor: pointer;
  }
  nav.tabs button:last-child { border-right: none; }
  nav.tabs button.active {
    background: var(--ink);
    color: var(--paper);
  }
  nav.tabs button:disabled {
    opacity: 0.35;
    cursor: not-allowed;
  }

  .header-actions {
    display: flex;
    gap: 10px;
    align-items: center;
  }

  .icon-btn {
    border: 1.5px solid var(--ink);
    background: transparent;
    padding: 6px 12px;
    font-family: inherit;
    font-size: 12px;
    letter-spacing: 0.05em;
    text-transform: lowercase;
    cursor: pointer;
    transition: background 120ms;
  }
  .icon-btn:hover {
    background: var(--ink);
    color: var(--paper);
  }

  /* ============ MAIN LAYOUT ============ */
  main {
    flex: 1;
    display: grid;
    grid-template-columns: 230px 1fr;
    overflow: hidden;
  }

  /* ============ PALETTE ============ */
  #palette {
    border-right: 1.5px solid var(--ink);
    padding: 18px 18px 18px 20px;
    display: flex;
    flex-direction: column;
    gap: 18px;
    overflow-y: auto;
    background:
      repeating-linear-gradient(
        90deg,
        transparent 0 60px,
        rgba(26, 20, 16, 0.02) 60px 61px
      );
  }

  .palette-section h3 {
    font-family: 'Fraunces', serif;
    font-style: italic;
    font-weight: 400;
    font-size: 13px;
    color: var(--ink-soft);
    letter-spacing: 0.02em;
    margin-bottom: 8px;
  }

  .palette-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }

  /* Examples list (tab 2) */
  .example-list {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .example-btn {
    font-family: 'Fraunces', serif;
    font-size: 18px;
    font-weight: 600;
    color: var(--ink);
    background: var(--paper);
    border: 1.5px solid var(--ink);
    padding: 10px 14px;
    cursor: pointer;
    text-align: left;
    box-shadow: 2px 2px 0 var(--paper-shadow);
    transition: transform 100ms, box-shadow 100ms;
  }
  .example-btn:hover {
    transform: translate(-1px, -1px);
    box-shadow: 3px 3px 0 var(--paper-shadow);
    background: rgba(249, 151, 139, 0.06);
  }
  .example-btn:active {
    transform: translate(1px, 1px);
    box-shadow: 1px 1px 0 var(--paper-shadow);
  }

  /* Instructions panel (tab 2) */
  .palette-section.instructions {
    margin-top: auto;
    font-family: 'Fraunces', serif;
    font-size: 12px;
    color: var(--ink-soft);
    line-height: 1.5;
    padding: 14px 12px;
    border-top: 1px dashed var(--ink-soft);
  }
  .palette-section.instructions p {
    margin-bottom: 8px;
  }
  .palette-section.instructions p:last-child { margin-bottom: 0; }
  .palette-section.instructions b {
    color: var(--ink);
    font-weight: 600;
  }

  /* Send-to-oxidation button (tab 1) */
  .side-btn {
    width: 100%;
    font-family: 'Fraunces', serif;
    font-style: italic;
    font-size: 13px;
    color: var(--ink);
    background: var(--paper);
    border: 1.5px solid var(--ink);
    padding: 10px;
    cursor: pointer;
    box-shadow: 2px 2px 0 var(--paper-shadow);
    transition: transform 100ms, box-shadow 100ms;
  }
  .side-btn:hover {
    transform: translate(-1px, -1px);
    box-shadow: 3px 3px 0 var(--paper-shadow);
    background: rgba(131, 216, 244, 0.15);
  }
  #send-section { margin-top: auto; }

  .palette-item {
    position: relative;
    border: 1.5px solid var(--ink);
    background: var(--paper);
    aspect-ratio: 1 / 1;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: grab;
    user-select: none;
    touch-action: none;
    box-shadow: 2px 2px 0 var(--paper-shadow);
    transition: transform 120ms, box-shadow 120ms;
  }
  .palette-item:active {
    cursor: grabbing;
  }
  .palette-item:hover {
    transform: translate(-1px, -1px);
    box-shadow: 3px 3px 0 var(--paper-shadow);
  }
  .palette-item.depleted {
    opacity: 0.3;
    cursor: not-allowed;
    pointer-events: none;
  }
  .palette-item.wide {
    grid-column: span 2;
    aspect-ratio: 2.1 / 1;
  }

  .palette-item svg {
    width: 80%;
    height: 80%;
    overflow: visible;
  }

  .count-badge {
    position: absolute;
    top: -8px;
    right: -8px;
    background: var(--ink);
    color: var(--paper);
    min-width: 20px;
    height: 20px;
    border-radius: 10px;
    font-size: 11px;
    font-weight: 600;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0 6px;
    font-family: 'Inter Tight', monospace;
  }
  .count-badge.infinite {
    background: var(--paper);
    color: var(--ink);
    border: 1.5px solid var(--ink);
  }

  /* Trash is a palette tile now, sitting next to the electron */
  .trash-tile {
    cursor: default;
    border-style: dashed;
    border-color: var(--ink-soft);
    transition: background 150ms, border-color 150ms;
  }
  .trash-tile:hover {
    transform: none;
    box-shadow: 2px 2px 0 var(--paper-shadow);
  }
  .trash-tile svg {
    stroke: var(--ink-soft);
    transition: stroke 150ms;
  }
  #trash.active {
    border-color: var(--danger);
    background: rgba(154, 58, 46, 0.12);
  }
  #trash.active svg {
    stroke: var(--danger);
  }

  /* ============ WORKSPACE ============ */
  #workspace-container {
    position: relative;
    overflow: hidden;
    background:
      radial-gradient(circle at 50% 50%, transparent 0%, rgba(26, 20, 16, 0.02) 100%);
  }

  #workspace {
    width: 100%;
    height: 100%;
    display: block;
    touch-action: none;
  }

  /* Grid texture in workspace */
  #workspace-container::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image:
      radial-gradient(circle, rgba(26, 20, 16, 0.08) 1px, transparent 1.5px);
    background-size: 32px 32px;
    pointer-events: none;
    opacity: 0.4;
  }

  /* Floating cheat sheet */
  .cheatsheet {
    position: absolute;
    top: 16px;
    right: 16px;
    background: var(--paper);
    border: 1.5px solid var(--ink);
    padding: 14px 16px;
    font-size: 12.5px;
    line-height: 1.6;
    max-width: 220px;
    box-shadow: 3px 3px 0 var(--paper-shadow);
  }
  .cheatsheet h4 {
    font-family: 'Fraunces', serif;
    font-style: italic;
    font-weight: 400;
    font-size: 13px;
    margin-bottom: 6px;
    color: var(--ink-soft);
  }
  .cheatsheet ul {
    list-style: none;
  }
  .cheatsheet li {
    display: grid;
    grid-template-columns: 18px 1fr;
    gap: 6px;
    padding: 1px 0;
  }
  .cheatsheet li b {
    font-family: 'Fraunces', serif;
    font-weight: 600;
    color: var(--atom-deep);
  }
  .cheatsheet.collapsed {
    padding: 8px 12px;
    max-width: 40px;
  }
  .cheatsheet.collapsed ul,
  .cheatsheet.collapsed .sheet-body { display: none; }
  .cheatsheet-toggle {
    position: absolute;
    top: 6px;
    right: 6px;
    background: transparent;
    border: none;
    font-family: 'Fraunces', serif;
    font-size: 14px;
    cursor: pointer;
    color: var(--ink-soft);
    line-height: 1;
    padding: 2px 6px;
  }

  /* Readout panel for hover count */
  .readout {
    position: absolute;
    bottom: 16px;
    left: 16px;
    background: var(--ink);
    color: var(--paper);
    padding: 12px 16px;
    font-family: 'Inter Tight', monospace;
    font-size: 13px;
    line-height: 1.5;
    min-width: 180px;
    box-shadow: 3px 3px 0 var(--paper-shadow);
    opacity: 0;
    transition: opacity 150ms;
    pointer-events: none;
  }
  .readout.visible { opacity: 1; }
  .readout .el {
    font-family: 'Times New Roman', 'Times', 'Liberation Serif', serif;
    font-size: 22px;
    font-weight: 700;
    color: var(--atom);
    line-height: 1;
    margin-right: 4px;
  }
  .readout .count {
    font-family: 'Fraunces', serif;
    font-size: 32px;
    font-weight: 600;
    line-height: 1;
    display: block;
    margin-top: 4px;
    color: var(--bond);
  }
  .readout .count.charged {
    color: var(--atom);
  }
  .readout .target {
    font-size: 11px;
    color: rgba(242, 234, 216, 0.55);
    letter-spacing: 0.05em;
  }
  .readout .formal {
    display: block;
    margin-top: 6px;
    font-size: 11px;
    letter-spacing: 0.05em;
    color: rgba(242, 234, 216, 0.7);
  }
  .readout .formal .charged {
    color: var(--atom);
  }

  /* SVG element styles */
  .atom-text {
    cursor: grab;
    user-select: none;
    /* Fraunces has optical-size adjustments that look like subtle tilt on
       isolated capitals (C and O especially). Use a strict upright serif. */
    font-family: 'Times New Roman', 'Times', 'Liberation Serif', serif;
    font-weight: 700;
    font-size: 68px;
    fill: var(--atom);
    stroke: var(--ink);
    stroke-width: 1.4;
    paint-order: stroke fill;
  }
  .atom-text.dragging { cursor: grabbing; }

  .electron-circle {
    cursor: grab;
    fill: var(--atom);
    stroke: var(--ink);
    stroke-width: 1.3;
  }
  .electron-circle.dragging { cursor: grabbing; }
  .electron-circle.highlighted {
    stroke: var(--accent);
    stroke-width: 2.2;
  }

  .bond-body {
    fill: var(--bond);
    stroke: var(--ink);
    stroke-width: 1.4;
    stroke-linejoin: round;
    transition: fill 0.15s, stroke-width 0.15s;
  }
  /* Bond with electrons NOT on both ends — visibly inert */
  .bond-body.incomplete {
    fill: #dff3fa;
    stroke: #8fa5ac;
    stroke-dasharray: 4 3;
  }
  /* Complete bond that contributes to the hovered atom */
  .bond-body.contributing {
    stroke: var(--accent);
    stroke-width: 2.2;
  }
  .bond-middle-zone {
    fill: transparent;
    cursor: grab;
    pointer-events: all;
  }
  .bond-middle-zone.dragging { cursor: grabbing; }
  .bond-end-zone {
    fill: transparent;
    cursor: crosshair;
    pointer-events: all;
  }

  .hover-halo {
    fill: none;
    stroke: var(--accent);
    stroke-width: 1.2;
    stroke-dasharray: 5 4;
    opacity: 0.65;
    pointer-events: none;
  }

  /* Helper text when workspace is empty */
  .empty-hint {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    pointer-events: none;
    color: var(--ink-soft);
    font-family: 'Fraunces', serif;
    font-style: italic;
    font-size: 18px;
    opacity: 0.5;
    letter-spacing: 0.01em;
  }
</style>
</head>
<body>

<header>
  <div>
    <div class="brand"><span class="dot">·</span> Dot &amp; <span class="stick">Stick</span> <em>— a Lewis structure workbench</em></div>
    <div class="subtitle" id="subtitle">Tab 1 · Build</div>
  </div>
  <nav class="tabs" role="tablist">
    <button class="active" id="tab-build">Build</button>
    <button id="tab-oxidation">Oxidation</button>
    <button disabled title="Coming soon">Resonance</button>
  </nav>
  <div class="header-actions">
    <button class="icon-btn" id="reset-btn" title="Clear the workspace">reset</button>
  </div>
</header>

<main>
  <aside id="palette"></aside>

  <div id="workspace-container">
    <svg id="workspace" viewBox="0 0 1200 800" preserveAspectRatio="xMidYMid meet">
      <g id="bond-layer"></g>
      <g id="electron-layer"></g>
      <g id="atom-layer"></g>
      <g id="hover-layer"></g>
    </svg>
    <div class="empty-hint" id="empty-hint">Drag pieces from the store to begin</div>
    <div class="cheatsheet" id="cheatsheet"></div>
    <div class="readout" id="readout"></div>
  </div>
</main>

<script>
// ============================================================
// CONSTANTS
// ============================================================
const ATOM_PROX_RADIUS = 70;   // how close an electron must be to count toward an atom
const BOND_SOCKET_RADIUS = 18; // how close an electron must be to a bond end to "sit on" it
const BOND_LENGTH      = 120;
const BOND_WIDTH       = 22;
const BOND_CUP_DEPTH   = 4;
const BOND_ARC_R       = 20;
const ELECTRON_R       = 9;
const BOND_END_FRAC    = 0.25; // outer 25% of bond length on each side = rotate zone
const SNAP_LIFT        = 1.04; // scale bump while grabbed

const ATOM_INFO = {
  C: { valence: 4, octet: 8, label: 'C', en: 2.55 },
  N: { valence: 5, octet: 8, label: 'N', en: 3.04 },
  O: { valence: 6, octet: 8, label: 'O', en: 3.44 },
  F: { valence: 7, octet: 8, label: 'F', en: 3.98 },
  H: { valence: 1, octet: 2, label: 'H', en: 2.20 },
};

// ============================================================
// STATE
// ============================================================
const state = {
  mode: 'build',   // 'build' | 'oxidation'
  atoms: [],       // { id, element, x, y }
  bonds: [],       // { id, cx, cy, angle }    angle in radians
  electrons: [],   // { id, x, y }
  nextId: 1,
  drag: null,      // active drag descriptor
  hoveredAtomId: null,
};

// ============================================================
// EXAMPLES (tab 2) — simple, ready-to-split structures.
// Each example is a function that populates state with a fresh structure.
// Positions are absolute in SVG coords; keep them centered in the workspace.
// ============================================================
const EXAMPLES = [
  { key: 'h2o',   label: 'H₂O',   build: () => buildExample_H2O() },
  { key: 'nh3',   label: 'NH₃',   build: () => buildExample_NH3() },
  { key: 'ch4',   label: 'CH₄',   build: () => buildExample_CH4() },
  { key: 'co2',   label: 'CO₂',   build: () => buildExample_CO2() },
  { key: 'hcn',   label: 'HCN',   build: () => buildExample_HCN() },
  { key: 'h2o2',  label: 'H₂O₂',  build: () => buildExample_H2O2() },
  { key: 'hf',    label: 'HF',    build: () => buildExample_HF() },
];

// ============================================================
// DOM REFS
// ============================================================
const svg = document.getElementById('workspace');
const bondLayer = document.getElementById('bond-layer');
const electronLayer = document.getElementById('electron-layer');
const atomLayer = document.getElementById('atom-layer');
const hoverLayer = document.getElementById('hover-layer');
const readout = document.getElementById('readout');
const emptyHint = document.getElementById('empty-hint');
// trash tile is created inside buildPalette(); resolve lazily.
function getTrash() { return document.getElementById('trash'); }

// ============================================================
// SVG HELPERS
// ============================================================
const SVG_NS = 'http://www.w3.org/2000/svg';
function el(tag, attrs = {}, children = []) {
  const n = document.createElementNS(SVG_NS, tag);
  for (const [k, v] of Object.entries(attrs)) {
    if (v === null || v === undefined) continue;
    n.setAttribute(k, v);
  }
  for (const c of children) n.appendChild(c);
  return n;
}

function clientToSvg(clientX, clientY) {
  const pt = svg.createSVGPoint();
  pt.x = clientX; pt.y = clientY;
  return pt.matrixTransform(svg.getScreenCTM().inverse());
}

// Bond geometry: horizontal capsule with concave "cups" at each end.
// Drawn centered on origin, oriented along +x. Rotated via group transform.
function bondPathD() {
  const L = BOND_LENGTH, W = BOND_WIDTH, d = BOND_CUP_DEPTH, r = BOND_ARC_R;
  const xR = L / 2,  xL = -L / 2;
  const yT = -W / 2, yB = W / 2;
  const cupR = xR - d;     // right cup tip x
  const cupL = xL + d;     // left  cup tip x
  // Clockwise perimeter: top-right → right cup → bottom-right → bottom-left → left cup → top-left → close
  // Cups are concave (sweep = 0 means the arcs curve inward toward the bond body)
  return [
    `M ${xR} ${yT}`,
    `A ${r} ${r} 0 0 0 ${cupR} 0`,
    `A ${r} ${r} 0 0 0 ${xR} ${yB}`,
    `L ${xL} ${yB}`,
    `A ${r} ${r} 0 0 0 ${cupL} 0`,
    `A ${r} ${r} 0 0 0 ${xL} ${yT}`,
    'Z'
  ].join(' ');
}

function bondEndPositions(bond) {
  const dx = (BOND_LENGTH / 2) * Math.cos(bond.angle);
  const dy = (BOND_LENGTH / 2) * Math.sin(bond.angle);
  return {
    end1: { x: bond.cx + dx, y: bond.cy + dy },
    end2: { x: bond.cx - dx, y: bond.cy - dy },
  };
}

// Convert a world-space point to bond-local coordinates (bond's center is origin,
// bond's long axis is +x). Useful for snapshotting electron positions relative to
// a bond so they can ride along through translate + rotate.
function worldToBondLocal(x, y, bond) {
  const dx = x - bond.cx, dy = y - bond.cy;
  const c = Math.cos(bond.angle), s = Math.sin(bond.angle);
  return { lx:  c * dx + s * dy,
           ly: -s * dx + c * dy };
}

function bondLocalToWorld(lx, ly, bond) {
  const c = Math.cos(bond.angle), s = Math.sin(bond.angle);
  return { x: bond.cx + c * lx - s * ly,
           y: bond.cy + s * lx + c * ly };
}

// ============================================================
// EXAMPLE STRUCTURES (tab 2)
// Helper DSL: place an atom, then "socketed" bonds between atoms with
// their shared electrons auto-populated, plus the right number of lone
// electrons around each atom (Lewis-dot layout from tab 1's spawn logic).
// ============================================================
function clearWorkspace() {
  state.atoms = [];
  state.bonds = [];
  state.electrons = [];
  state.hoveredAtomId = null;
}

// Add an atom at (x, y), return its id
function addAtom(element, x, y) {
  const id = state.nextId++;
  state.atoms.push({ id, element, x, y });
  return id;
}

// Add lone electrons around an atom (Lewis-dot layout) to reach a target lone count.
// sides = { N: 0, E: 0, S: 0, W: 0 } mapping, values are how many electrons on that side (0, 1, or 2).
function addLoneElectrons(atomId, sides) {
  const atom = state.atoms.find(a => a.id === atomId);
  if (!atom) return;
  const R = 32 + ELECTRON_R;
  const PAIR_SEP = 3 * ELECTRON_R;
  const sideAngle = { N: -Math.PI / 2, E: 0, S: Math.PI / 2, W: Math.PI };
  for (const [side, count] of Object.entries(sides)) {
    if (!count) continue;
    const sa = sideAngle[side];
    const perp = sa + Math.PI / 2;
    for (let i = 0; i < count; i++) {
      const sign = count === 2 ? (i === 0 ? -1 : +1) : 0;
      const dx = R * Math.cos(sa) + sign * (PAIR_SEP / 2) * Math.cos(perp);
      const dy = R * Math.sin(sa) + sign * (PAIR_SEP / 2) * Math.sin(perp);
      state.electrons.push({ id: state.nextId++, x: atom.x + dx, y: atom.y + dy });
    }
  }
}

// Add a single-bond between two atoms, with electrons socketed at both ends.
// offsetAlong: shift the bond along its axis (for double/triple bonds stacked).
// perpOffset: perpendicular shift from the center line (for stacking parallel bonds).
function addBond(atomAId, atomBId, perpOffset = 0) {
  const a = state.atoms.find(x => x.id === atomAId);
  const b = state.atoms.find(x => x.id === atomBId);
  if (!a || !b) return;
  const mx = (a.x + b.x) / 2;
  const my = (a.y + b.y) / 2;
  const angle = Math.atan2(b.y - a.y, b.x - a.x);
  // Apply perpendicular offset for stacked bonds
  const px = -Math.sin(angle) * perpOffset;
  const py =  Math.cos(angle) * perpOffset;
  const bond = { id: state.nextId++, cx: mx + px, cy: my + py, angle };
  state.bonds.push(bond);
  // Socket an electron at each end, placed right at the bond-end position
  const { end1, end2 } = bondEndPositions(bond);
  state.electrons.push({ id: state.nextId++, x: end1.x, y: end1.y });
  state.electrons.push({ id: state.nextId++, x: end2.x, y: end2.y });
  return bond;
}

function buildExample_H2O() {
  clearWorkspace();
  const cx = 600, cy = 380;
  // H-O-H bent at ~105°. Use 230-unit bond lengths so socketed electrons
  // sit ~55 units from each atom — outside the 40-unit hover radius,
  // comfortably inside the 70-unit counting halo.
  const O = addAtom('O', cx, cy);
  const D = 230;
  const theta = (105 * Math.PI / 180) / 2;  // half-angle from vertical axis
  const H1 = addAtom('H', cx - D * Math.sin(theta), cy + D * Math.cos(theta));
  const H2 = addAtom('H', cx + D * Math.sin(theta), cy + D * Math.cos(theta));
  addBond(O, H1);
  addBond(O, H2);
  // Bonds go down-left and down-right. Place 2 lone pairs on the free sides: N and... 
  // Actually with bonds going SW and SE, sides E and W are both ~45° from bonds,
  // so N (up) is cleanest for one pair; put the second pair on S? No — bonds occupy SW/SE.
  // Best free sides: N and (E or W) — use N and E for asymmetric but clean display.
  addLoneElectrons(O, { N: 2, E: 2 });
}

function buildExample_NH3() {
  clearWorkspace();
  const cx = 600, cy = 420;
  const N = addAtom('N', cx, cy);
  // Three H atoms around N at 230 units, spread as an inverted trident
  const D = 230;
  const H1 = addAtom('H', cx - D * Math.sin(Math.PI / 3), cy + D * Math.cos(Math.PI / 3));
  const H2 = addAtom('H', cx + D * Math.sin(Math.PI / 3), cy + D * Math.cos(Math.PI / 3));
  const H3 = addAtom('H', cx, cy + D);
  addBond(N, H1);
  addBond(N, H2);
  addBond(N, H3);
  // Lone pair on top (the free side)
  addLoneElectrons(N, { N: 2 });
}

function buildExample_CH4() {
  clearWorkspace();
  const cx = 600, cy = 400;
  const C = addAtom('C', cx, cy);
  const D = 230;
  const H1 = addAtom('H', cx, cy - D);
  const H2 = addAtom('H', cx + D, cy);
  const H3 = addAtom('H', cx, cy + D);
  const H4 = addAtom('H', cx - D, cy);
  addBond(C, H1);
  addBond(C, H2);
  addBond(C, H3);
  addBond(C, H4);
}

function buildExample_CO2() {
  clearWorkspace();
  const cx = 600, cy = 400;
  const C  = addAtom('C', cx, cy);
  const O1 = addAtom('O', cx - 230, cy);
  const O2 = addAtom('O', cx + 230, cy);
  // Double bonds: two parallel bonds with perpendicular offset
  addBond(C, O1, -14);
  addBond(C, O1,  14);
  addBond(C, O2, -14);
  addBond(C, O2,  14);
  addLoneElectrons(O1, { N: 2, S: 2 });
  addLoneElectrons(O2, { N: 2, S: 2 });
}

function buildExample_HCN() {
  clearWorkspace();
  const cx = 400, cy = 400;
  const H = addAtom('H', cx, cy);
  const C = addAtom('C', cx + 230, cy);
  const N = addAtom('N', cx + 460, cy);
  addBond(H, C);
  // Triple bond C≡N: three parallel bonds
  addBond(C, N, -22);
  addBond(C, N,   0);
  addBond(C, N,  22);
  addLoneElectrons(N, { E: 2 });
}

function buildExample_H2O2() {
  clearWorkspace();
  const cx = 600, cy = 400;
  // H-O-O-H zigzag. Two O's 230 apart horizontally; H's 230 from each O,
  // angled upward-outward at ~60° from the O-O axis (so the bonds don't overlap).
  const O1 = addAtom('O', cx - 115, cy + 50);
  const O2 = addAtom('O', cx + 115, cy + 50);
  const D = 230;
  const ang = 60 * Math.PI / 180;  // angle above the O-O line
  const H1 = addAtom('H', (cx - 115) - D * Math.cos(ang), (cy + 50) - D * Math.sin(ang));
  const H2 = addAtom('H', (cx + 115) + D * Math.cos(ang), (cy + 50) - D * Math.sin(ang));
  addBond(O1, O2);
  addBond(O1, H1);
  addBond(O2, H2);
  // Each O: two lone pairs. Bonds go roughly right (to O2), upper-left (to H1) for O1.
  // Put both pairs on S side and maybe E side for O1 — simpler to just pick non-occupied sides.
  addLoneElectrons(O1, { S: 2, N: 2 });
  addLoneElectrons(O2, { S: 2, N: 2 });
}

function buildExample_HF() {
  clearWorkspace();

  const F = addAtom('F', cx + 200, cy);
  addBond(H, F);

}

// ============================================================
// RENDER
// ============================================================
function render() {
  bondLayer.textContent = '';
  electronLayer.textContent = '';
  atomLayer.textContent = '';
  hoverLayer.textContent = '';

  // Figure out electron↔bond-end sockets once per render
  const sockets = computeSocketState();

  // Hover halo and highlights first (go under pieces)
  let contributors = {
    proxElectrons: new Set(),
    sharedElectrons: new Set(),
    completeBondsNear: new Set(),
  };
  if (state.hoveredAtomId !== null) {
    const atom = state.atoms.find(a => a.id === state.hoveredAtomId);
    if (atom) {
      contributors = findContributorsTo(atom, sockets);
      hoverLayer.appendChild(el('circle', {
        cx: atom.x, cy: atom.y, r: ATOM_PROX_RADIUS,
        class: 'hover-halo'
      }));
    }
  }

  // Bonds
  for (const bond of state.bonds) {
    const g = el('g', {
      'data-id': bond.id,
      'data-kind': 'bond',
      transform: `translate(${bond.cx} ${bond.cy}) rotate(${bond.angle * 180 / Math.PI})${
        state.drag && state.drag.id === bond.id ? ` scale(${SNAP_LIFT})` : ''
      }`,
    });
    const complete = isBondComplete(bond.id, sockets);
    const contributing = contributors.completeBondsNear && contributors.completeBondsNear.has(bond.id);
    let bodyClass = 'bond-body';
    if (!complete) bodyClass += ' incomplete';
    if (contributing) bodyClass += ' contributing';
    g.appendChild(el('path', { d: bondPathD(), class: bodyClass }));

    // Middle zone (translate)
    const midW = BOND_LENGTH * (1 - 2 * BOND_END_FRAC);
    g.appendChild(el('rect', {
      x: -midW / 2, y: -BOND_WIDTH / 2,
      width: midW, height: BOND_WIDTH,
      class: 'bond-middle-zone',
      'data-zone': 'middle',
    }));
    // End zones (rotate)
    const endW = BOND_LENGTH * BOND_END_FRAC;
    g.appendChild(el('rect', {
      x: BOND_LENGTH / 2 - endW, y: -BOND_WIDTH / 2,
      width: endW, height: BOND_WIDTH,
      class: 'bond-end-zone',
      'data-zone': 'end1',
    }));
    g.appendChild(el('rect', {
      x: -BOND_LENGTH / 2, y: -BOND_WIDTH / 2,
      width: endW, height: BOND_WIDTH,
      class: 'bond-end-zone',
      'data-zone': 'end2',
    }));
    bondLayer.appendChild(g);
  }

  // Electrons
  for (const e of state.electrons) {
    const isHighlighted =
      contributors.proxElectrons.has(e.id) ||
      contributors.sharedElectrons.has(e.id);
    electronLayer.appendChild(el('circle', {
      cx: e.x, cy: e.y, r: ELECTRON_R,
      class: 'electron-circle' + (isHighlighted ? ' highlighted' : ''),
      'data-id': e.id,
      'data-kind': 'electron',
    }));
  }

  // Atoms (on top)
  for (const a of state.atoms) {
    atomLayer.appendChild(el('text', {
      x: a.x, y: a.y,
      'text-anchor': 'middle',
      'dominant-baseline': 'central',
      class: 'atom-text',
      'data-id': a.id,
      'data-kind': 'atom',
    }, [document.createTextNode(a.element)]));
  }

  const isEmpty = state.atoms.length === 0 && state.bonds.length === 0 && state.electrons.length === 0;
  if (isEmpty) {
    emptyHint.textContent = state.mode === 'build'
      ? 'Drag pieces from the store to begin'
      : 'Pick an example from the side panel';
    emptyHint.style.display = 'flex';
  } else {
    emptyHint.style.display = 'none';
  }

  updateReadout();
}

// ============================================================
// ELECTRON COUNTING
// ============================================================

// Figure out which electrons are sitting on which bond ends.
// Each electron claims its single closest bond-end within BOND_SOCKET_RADIUS;
// if two electrons target the same end, the closer one wins (the other is free).
function computeSocketState() {
  const bondSockets = new Map(); // bond.id -> { end1, end2, d1, d2 }
  const electronSockets = new Map(); // electron.id -> { bondId, end }
  for (const b of state.bonds) {
    bondSockets.set(b.id, { end1: null, end2: null, d1: Infinity, d2: Infinity });
  }
  for (const e of state.electrons) {
    let bestBond = null, bestEnd = null, bestDist = BOND_SOCKET_RADIUS;
    for (const b of state.bonds) {
      const { end1, end2 } = bondEndPositions(b);
      const d1 = Math.hypot(e.x - end1.x, e.y - end1.y);
      const d2 = Math.hypot(e.x - end2.x, e.y - end2.y);
      if (d1 < bestDist) { bestDist = d1; bestBond = b.id; bestEnd = 'end1'; }
      if (d2 < bestDist) { bestDist = d2; bestBond = b.id; bestEnd = 'end2'; }
    }
    if (bestBond !== null) {
      const slot = bondSockets.get(bestBond);
      const endKey = bestEnd;
      const distKey = bestEnd === 'end1' ? 'd1' : 'd2';
      if (bestDist < slot[distKey]) {
        // Evict the prior occupant (if any) so it becomes free again.
        if (slot[endKey] !== null) electronSockets.delete(slot[endKey]);
        slot[endKey] = e.id;
        slot[distKey] = bestDist;
        electronSockets.set(e.id, { bondId: bestBond, end: endKey });
      }
    }
  }
  return { bondSockets, electronSockets };
}

function isBondComplete(bondId, sockets) {
  const s = sockets.bondSockets.get(bondId);
  return !!(s && s.end1 !== null && s.end2 !== null);
}

function findContributorsTo(atom, sockets) {
  const proxElectrons = new Set();     // all electrons within atom's proximity
  const bondedNearby = new Set();      // of those, the ones sitting on a complete bond
  const sharedElectrons = new Set();   // far-end electrons gifted by complete bonds
  const completeBondsNear = new Set(); // complete bonds with at least one end in proximity

  for (const e of state.electrons) {
    if (Math.hypot(e.x - atom.x, e.y - atom.y) <= ATOM_PROX_RADIUS) {
      proxElectrons.add(e.id);
    }
  }

  for (const b of state.bonds) {
    const slot = sockets.bondSockets.get(b.id);
    if (!slot.end1 || !slot.end2) continue; // bond is inert — skip entirely
    const { end1, end2 } = bondEndPositions(b);
    const end1Near = Math.hypot(end1.x - atom.x, end1.y - atom.y) <= ATOM_PROX_RADIUS;
    const end2Near = Math.hypot(end2.x - atom.x, end2.y - atom.y) <= ATOM_PROX_RADIUS;
    if (!end1Near && !end2Near) continue;
    completeBondsNear.add(b.id);
    if (end1Near) bondedNearby.add(slot.end1);
    if (end2Near) bondedNearby.add(slot.end2);
    // Sharing bonus: far-end's electron counts for this atom when only one end is near
    if (end1Near && !end2Near) sharedElectrons.add(slot.end2);
    if (end2Near && !end1Near) sharedElectrons.add(slot.end1);
  }

  const loneElectrons = new Set([...proxElectrons].filter(id => !bondedNearby.has(id)));

  return { proxElectrons, bondedNearby, sharedElectrons, completeBondsNear, loneElectrons };
}

function countElectrons(atom, sockets) {
  const c = findContributorsTo(atom, sockets);
  const total = c.proxElectrons.size + c.sharedElectrons.size;
  return {
    total,
    lone: c.loneElectrons.size,           // in prox and not on a complete bond
    bondCount: c.completeBondsNear.size,  // # of complete bonds adjacent to this atom
    contributors: c,
  };
}

function updateReadout() {
  if (state.hoveredAtomId === null) {
    readout.classList.remove('visible');
    return;
  }
  const atom = state.atoms.find(a => a.id === state.hoveredAtomId);
  if (!atom) { readout.classList.remove('visible'); return; }

  const info = ATOM_INFO[atom.element];
  const sockets = computeSocketState();
  const c = countElectrons(atom, sockets);

  if (state.mode === 'oxidation') {
    // Oxidation number = "should" − "has"
    // "should" = neutral-atom valence electrons
    // "has"    = electrons currently counted around this atom
    const should = info.valence;
    const has = c.total;
    const ox = should - has;
    const oxStr = ox === 0 ? '0' : (ox > 0 ? `+${ox}` : `${ox}`);
    const oxClass = ox === 0 ? '' : 'charged';

    readout.innerHTML = `
      <div><span class="el">${atom.element}</span><span class="target">ox number</span></div>
      <span class="count ${oxClass}">${oxStr}</span>
      <span class="target" style="display:block;margin-top:6px;">
        should: ${should} &nbsp; has: ${has}
      </span>
      <span class="formal">= should − has</span>
    `;
    readout.classList.add('visible');
    return;
  }

  // Build mode: formal charge = valence − lone − (# complete bonds touching)
  const formal = info.valence - c.lone - c.bondCount;
  const target = info.octet;

  const formalStr = formal === 0
    ? `formal charge: <span>0</span>`
    : `formal charge: <span class="charged">${formal > 0 ? '+' : ''}${formal}</span>`;

  const targetLabel = atom.element === 'H' ? 'duet (2)' : 'octet (8)';

  readout.innerHTML = `
    <div><span class="el">${atom.element}</span><span class="target">${targetLabel}</span></div>
    <span class="count">${c.total}<span style="font-size: 14px; opacity: 0.55;"> /&nbsp;${target}</span></span>
    <span class="target" style="display:block;margin-top:4px;">${c.bondCount} bond${c.bondCount === 1 ? '' : 's'} · ${c.lone} lone e⁻</span>
    <span class="formal">${formalStr}</span>
  `;
  readout.classList.add('visible');
}

// ============================================================
// DRAGGING
// ============================================================
function startPaletteDrag(e, type, element) {
  e.preventDefault();

  const pt = clientToSvg(e.clientX, e.clientY);
  const id = state.nextId++;

  let kind;
  const spawnedElectrons = []; // {id, dx, dy} offsets from atom center
  if (type === 'atom') {
    state.atoms.push({ id, element, x: pt.x, y: pt.y });
    kind = 'atom';
    // Spawn the atom's valence electrons around it in a Lewis-dot layout:
    // fill N, E, S, W with singles first; then pair up on those sides in order.
    const valence = ATOM_INFO[element].valence;
    const R = 32 + ELECTRON_R;  // distance from atom center to each side
    const PAIR_SEP = 3 * ELECTRON_R;  // separation between two electrons of a pair (diameter + one radius gap)
    const pairCount = Math.max(0, valence - 4);  // how many sides get a pair
    for (let k = 0; k < valence; k++) {
      const sideIdx = k < 4 ? k : (k - 4);  // N=0, E=1, S=2, W=3
      const isSecond = k >= 4;
      const sideAngle = -Math.PI / 2 + sideIdx * (Math.PI / 2);
      const perpAngle = sideAngle + Math.PI / 2;
      const willPair = sideIdx < pairCount;
      const sign = willPair ? (isSecond ? +1 : -1) : 0;
      const dx = R * Math.cos(sideAngle) + sign * (PAIR_SEP / 2) * Math.cos(perpAngle);
      const dy = R * Math.sin(sideAngle) + sign * (PAIR_SEP / 2) * Math.sin(perpAngle);
      const eId = state.nextId++;
      state.electrons.push({ id: eId, x: pt.x + dx, y: pt.y + dy });
      spawnedElectrons.push({ id: eId, dx, dy });
    }
  } else if (type === 'electron') {
    state.electrons.push({ id, x: pt.x, y: pt.y });
    kind = 'electron';
  } else if (type === 'bond') {
    state.bonds.push({ id, cx: pt.x, cy: pt.y, angle: 0 });
    kind = 'bond';
  }

  state.drag = {
    id,
    kind,
    mode: 'translate',
    offsetX: 0, // spawn at cursor, no offset
    offsetY: 0,
    // remember that this came from the palette so trash can clean up
    spawnedFromPalette: true,
    originalElement: element,
    spawnedElectrons, // valence electrons to drag along with the atom
  };

  render();
  window.addEventListener('pointermove', onPointerMove);
  window.addEventListener('pointerup', onPointerUp);
}

function startWorkspaceDrag(e) {
  // Determine target based on what was clicked
  let target = e.target;
  // Walk up to find a data-kind element
  while (target && target !== svg && !target.dataset?.kind && target.dataset?.zone === undefined) {
    target = target.parentNode;
  }
  if (!target || target === svg) return;

  const pt = clientToSvg(e.clientX, e.clientY);

  // For bond zones (middle / end), parent <g> has data-id / data-kind='bond'
  if (target.dataset.zone) {
    const bondG = target.parentNode;
    const id = Number(bondG.dataset.id);
    const bond = state.bonds.find(b => b.id === id);
    if (!bond) return;
    e.preventDefault();

    // Find electrons currently socketed to this bond so they ride along.
    // In oxidation mode, bonds do NOT carry their electrons — electrons stay
    // where they are so the student can "split" the bond.
    const sockets = computeSocketState();
    const slot = sockets.bondSockets.get(id);
    const attached = [];
    if (state.mode !== 'oxidation') {
      for (const endKey of ['end1', 'end2']) {
        const eId = slot && slot[endKey];
        if (eId == null) continue;
        const elec = state.electrons.find(x => x.id === eId);
        if (!elec) continue;
        const local = worldToBondLocal(elec.x, elec.y, bond);
        attached.push({ id: elec.id, localX: local.lx, localY: local.ly });
      }
    }

    if (target.dataset.zone === 'middle') {
      state.drag = {
        id, kind: 'bond', mode: 'translate',
        offsetX: pt.x - bond.cx,
        offsetY: pt.y - bond.cy,
        attached,
      };
    } else {
      // End drag: remember the pivot (the OPPOSITE end)
      const { end1, end2 } = bondEndPositions(bond);
      const pivot = target.dataset.zone === 'end1' ? end2 : end1;
      state.drag = {
        id, kind: 'bond', mode: target.dataset.zone, // 'end1' or 'end2'
        pivotX: pivot.x, pivotY: pivot.y,
        attached,
      };
    }
    render();
    window.addEventListener('pointermove', onPointerMove);
    window.addEventListener('pointerup', onPointerUp);
    return;
  }

  // Otherwise it's an atom or electron
  const kind = target.dataset.kind;
  const id = Number(target.dataset.id);
  if (!kind || !id) return;
  e.preventDefault();

  let item;
  if (kind === 'atom')     item = state.atoms.find(a => a.id === id);
  else if (kind === 'electron') item = state.electrons.find(el_ => el_.id === id);
  if (!item) return;

  // If an electron was socketed on a bond at drag start, remember it.
  // On drag end in oxidation mode, if the electron left the socket, the
  // bond can no longer be complete → it dissolves.
  let originBondId = null;
  if (kind === 'electron' && state.mode === 'oxidation') {
    const sockets = computeSocketState();
    const s = sockets.electronSockets.get(id);
    if (s) originBondId = s.bondId;
  }

  state.drag = {
    id, kind, mode: 'translate',
    offsetX: pt.x - item.x,
    offsetY: pt.y - item.y,
    originBondId,
  };
  render();
  window.addEventListener('pointermove', onPointerMove);
  window.addEventListener('pointerup', onPointerUp);
}

function onPointerMove(e) {
  if (!state.drag) return;
  const pt = clientToSvg(e.clientX, e.clientY);

  if (state.drag.kind === 'atom') {
    const a = state.atoms.find(a => a.id === state.drag.id);
    if (a) {
      a.x = pt.x - state.drag.offsetX;
      a.y = pt.y - state.drag.offsetY;
      // Carry spawned valence electrons along during initial palette drag
      if (state.drag.spawnedElectrons) {
        for (const s of state.drag.spawnedElectrons) {
          const elec = state.electrons.find(x => x.id === s.id);
          if (elec) { elec.x = a.x + s.dx; elec.y = a.y + s.dy; }
        }
      }
    }
  } else if (state.drag.kind === 'electron') {
    const el_ = state.electrons.find(el2 => el2.id === state.drag.id);
    if (el_) { el_.x = pt.x - state.drag.offsetX; el_.y = pt.y - state.drag.offsetY; }
  } else if (state.drag.kind === 'bond') {
    const b = state.bonds.find(b => b.id === state.drag.id);
    if (!b) return;
    if (state.drag.mode === 'translate') {
      b.cx = pt.x - state.drag.offsetX;
      b.cy = pt.y - state.drag.offsetY;
    } else {
      // Rotate around the opposite end, keeping bond length fixed.
      // Cursor sets direction; the dragged end lands at distance BOND_LENGTH from pivot.
      // Center always sits at pivot + (L/2)·û regardless of which end is dragged —
      // only the angle differs (atan2 reflects for end2 since angle is measured
      // from center toward end1, which is the pivot in the end2-drag case).
      const pivotX = state.drag.pivotX, pivotY = state.drag.pivotY;
      const dx = pt.x - pivotX, dy = pt.y - pivotY;
      const len = Math.hypot(dx, dy) || 1; // guard against zero
      const ux = dx / len, uy = dy / len;
      b.cx = pivotX + (BOND_LENGTH / 2) * ux;
      b.cy = pivotY + (BOND_LENGTH / 2) * uy;
      b.angle = state.drag.mode === 'end1'
        ? Math.atan2(uy, ux)
        : Math.atan2(-uy, -ux);
    }
    // Drag any socketed electrons along with the bond using snapshotted local coords.
    if (state.drag.attached) {
      for (const att of state.drag.attached) {
        const elec = state.electrons.find(x => x.id === att.id);
        if (!elec) continue;
        const w = bondLocalToWorld(att.localX, att.localY, b);
        elec.x = w.x;
        elec.y = w.y;
      }
    }
  }

  // Trash hover feedback
  const overTrash = isOverTrash(e.clientX, e.clientY);
  const trashEl = getTrash();
  if (trashEl) trashEl.classList.toggle('active', overTrash);

  render();
}

function onPointerUp(e) {
  if (!state.drag) return;
  const overTrash = isOverTrash(e.clientX, e.clientY);

  if (overTrash) {
    // Delete the dragged item
    if (state.drag.kind === 'atom') {
      state.atoms = state.atoms.filter(a => a.id !== state.drag.id);
      // If this atom came fresh from the palette and is being immediately
      // trashed, sweep its valence electrons away too.
      if (state.drag.spawnedElectrons && state.drag.spawnedElectrons.length) {
        const trashIds = new Set(state.drag.spawnedElectrons.map(s => s.id));
        state.electrons = state.electrons.filter(el_ => !trashIds.has(el_.id));
      }
    } else if (state.drag.kind === 'electron') {
      state.electrons = state.electrons.filter(el_ => el_.id !== state.drag.id);
    } else if (state.drag.kind === 'bond') {
      state.bonds = state.bonds.filter(b => b.id !== state.drag.id);
    }
  }

  // In oxidation mode: if the dragged electron originated on a bond socket
  // and is no longer socketed to that bond, the bond can't be complete
  // anymore — dissolve it. This also handles the "dragged onto trash" case
  // since the electron has been removed from state.electrons by then.
  if (state.drag.kind === 'electron' && state.drag.originBondId != null) {
    const bond = state.bonds.find(b => b.id === state.drag.originBondId);
    if (bond) {
      const postSockets = computeSocketState();
      const slot = postSockets.bondSockets.get(bond.id);
      const stillFull = slot && slot.end1 !== null && slot.end2 !== null;
      if (!stillFull) {
        state.bonds = state.bonds.filter(b => b.id !== bond.id);
      }
    }
  }

  const trashEl2 = getTrash();
  if (trashEl2) trashEl2.classList.remove('active');
  state.drag = null;
  window.removeEventListener('pointermove', onPointerMove);
  window.removeEventListener('pointerup', onPointerUp);
  render();
}

function isOverTrash(clientX, clientY) {
  const trashEl = getTrash();
  if (!trashEl) return false;
  const r = trashEl.getBoundingClientRect();
  return clientX >= r.left && clientX <= r.right && clientY >= r.top && clientY <= r.bottom;
}

// ============================================================
// HOVER (for electron counting)
// ============================================================
function onWorkspaceHover(e) {
  if (state.drag) return; // don't update hover mid-drag
  const pt = clientToSvg(e.clientX, e.clientY);
  let hit = null;
  for (const a of state.atoms) {
    if (Math.hypot(pt.x - a.x, pt.y - a.y) < 40) { hit = a.id; break; }
  }
  if (hit !== state.hoveredAtomId) {
    state.hoveredAtomId = hit;
    render();
  }
}

function onWorkspaceLeave() {
  if (state.hoveredAtomId !== null) {
    state.hoveredAtomId = null;
    render();
  }
}

// ============================================================
// TAB SWITCHING
// ============================================================
function setMode(mode) {
  state.mode = mode;
  state.hoveredAtomId = null;
  state.drag = null;

  // Tab bar styling
  document.getElementById('tab-build').classList.toggle('active', mode === 'build');
  document.getElementById('tab-oxidation').classList.toggle('active', mode === 'oxidation');
  document.getElementById('subtitle').textContent =
    mode === 'build' ? 'Tab 1 · Build' : 'Tab 2 · Oxidation';

  buildPalette();
  buildCheatsheet();
  render();
}

function buildCheatsheet() {
  const sheet = document.getElementById('cheatsheet');
  sheet.classList.remove('collapsed');
  if (state.mode === 'build') {
    sheet.innerHTML = `
      <button class="cheatsheet-toggle" id="sheet-toggle">×</button>
      <h4>Bonding patterns</h4>
      <div class="sheet-body">
        <ul>
          <li><b>H</b><span>1 bond</span></li>
          <li><b>C</b><span>4 bonds</span></li>
          <li><b>N</b><span>3 bonds · 1 lone pair</span></li>
          <li><b>O</b><span>2 bonds · 2 lone pairs</span></li>
          <li><b>F</b><span>1 bond · 3 lone pairs</span></li>
        </ul>
        <p style="font-size: 11px; color: var(--ink-soft); margin-top: 8px; font-style: italic; font-family: 'Fraunces', serif;">
          Hover an atom to count its electrons.
        </p>
      </div>
    `;
  } else {
    sheet.innerHTML = `
      <button class="cheatsheet-toggle" id="sheet-toggle">×</button>
      <h4>Electronegativity</h4>
      <div class="sheet-body">
        <ul>
          <li><b>H</b><span>2.20</span></li>
          <li><b>C</b><span>2.55</span></li>
          <li><b>N</b><span>3.04</span></li>
          <li><b>O</b><span>3.44</span></li>
          <li><b>F</b><span>3.98</span></li>
        </ul>
        <p style="font-size: 11px; color: var(--ink-soft); margin-top: 8px; font-style: italic; font-family: 'Fraunces', serif;">
          Hover an atom to see its oxidation number.
        </p>
      </div>
    `;
  }
  const toggle = document.getElementById('sheet-toggle');
  toggle.addEventListener('click', () => {
    const collapsed = sheet.classList.toggle('collapsed');
    toggle.textContent = collapsed ? '?' : '×';
  });
}

// ============================================================
// WIRE UP EVENTS
// ============================================================
svg.addEventListener('pointerdown', startWorkspaceDrag);
svg.addEventListener('pointermove', onWorkspaceHover);
svg.addEventListener('pointerleave', onWorkspaceLeave);

document.getElementById('tab-build').addEventListener('click', () => setMode('build'));
document.getElementById('tab-oxidation').addEventListener('click', () => setMode('oxidation'));

document.getElementById('reset-btn').addEventListener('click', () => {
  state.atoms = [];
  state.bonds = [];
  state.electrons = [];
  state.hoveredAtomId = null;
  render();
});

// Initialize
buildPalette();
buildCheatsheet();
render();
</script>
</body>
</html>
